<div class="chart-card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <h3>🌐 Gestión de Áreas Comunes</h3>
    <button class="btn-login" style="width:auto;padding:8px 16px;font-size:13px" id="btnNuevaArea">+ Nueva área</button>
  </div>

  <div id="listaAreas"></div>
  <p id="areasMsg" style="color:#d33;font-size:12.5px;margin-top:8px"></p>
</div>

<div id="modalArea" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:100">
  <div style="background:#fff;border-radius:12px;padding:24px;width:380px;max-height:85vh;overflow-y:auto">
    <h3 id="modalAreaTitulo" style="margin-bottom:14px">Nueva área</h3>
    <input type="hidden" id="areaIdEdit">

    <label style="font-size:12.5px;color:#6b7280">Nombre</label>
    <input type="text" id="areaNombreInput" placeholder="Cafetería" style="width:100%;padding:10px;border:1px solid #dde3ea;border-radius:6px;margin:6px 0 14px">

    <label style="font-size:12.5px;color:#6b7280">Tipo</label>
    <input type="text" id="areaTipoInput" placeholder="Zona de Descanso" style="width:100%;padding:10px;border:1px solid #dde3ea;border-radius:6px;margin:6px 0 14px">

    <label style="font-size:12.5px;color:#6b7280">Información</label>
    <input type="text" id="areaInfoInput" placeholder="Espacio de descanso al aire libre" style="width:100%;padding:10px;border:1px solid #dde3ea;border-radius:6px;margin:6px 0 14px">

    <label style="font-size:12.5px;color:#6b7280">Mapa asociado</label>
    <input type="text" id="areaMapaInput" placeholder="Campus" style="width:100%;padding:10px;border:1px solid #dde3ea;border-radius:6px;margin:6px 0 14px">

    <label style="font-size:12.5px;color:#6b7280">Servicios (separados por coma)</label>
    <input type="text" id="areaServiciosInput" placeholder="WiFi, Asientos" style="width:100%;padding:10px;border:1px solid #dde3ea;border-radius:6px;margin:6px 0 16px">

    <div style="display:flex;gap:8px">
      <button id="btnGuardarArea" style="flex:1;padding:10px;background:#123a5e;color:#fff;border:none;border-radius:6px;cursor:pointer">Guardar</button>
      <button id="btnCancelarArea" style="flex:1;padding:10px;background:#f1f3f6;border:none;border-radius:6px;cursor:pointer">Cancelar</button>
    </div>
  </div>
</div>
