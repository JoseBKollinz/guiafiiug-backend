<div class="chart-card">
    <div
        style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
        <h3><i class="ti ti-users"></i> Gestión de Usuarios (Estudiantes)</h3>
        <button class="btn-login" style="width:auto;padding:8px 16px;font-size:13px" id="btnNuevoUsuario"><i
                class="ti ti-plus"></i> Nuevo estudiante</button>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px">
        <input type="text" id="filtroNombre" placeholder="Filtrar por nombre"
            style="padding:9px 10px;border:1px solid #dde3ea;border-radius:6px;font-size:13px">
        <input type="text" id="filtroApellido" placeholder="Filtrar por apellido"
            style="padding:9px 10px;border:1px solid #dde3ea;border-radius:6px;font-size:13px">
        <input type="text" id="filtroCedula" placeholder="Filtrar por cédula"
            style="padding:9px 10px;border:1px solid #dde3ea;border-radius:6px;font-size:13px">
        <input type="date" id="filtroFecha"
            style="padding:9px 10px;border:1px solid #dde3ea;border-radius:6px;font-size:13px">
        <button id="btnLimpiarFiltros"
            style="padding:9px 10px;border:1px solid #dde3ea;border-radius:6px;background:#f1f3f6;cursor:pointer;font-size:13px">Limpiar
            filtros</button>
    </div>

    <div style="overflow-x:auto">
        <table class="tabla-cds">
            <tr style="border-bottom:2px solid #e5e9f0;text-align:left">
                <th style="padding:10px 8px">Nombre</th>
                <th style="padding:10px 8px">Apellido</th>
                <th style="padding:10px 8px">Cédula</th>
                <th style="padding:10px 8px">Fecha de registro</th>
                <th style="padding:10px 8px;text-align:center">Acciones</th>
            </tr>
            </thead>
            <tbody id="tablaUsuarios"></tbody>
        </table>
    </div>
    <p id="usuariosMsg" style="color:#d33;font-size:12.5px;margin-top:8px"></p>
</div>

<div id="modalUsuario"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:100">
    <div style="background:#fff;border-radius:12px;padding:24px;width:340px">
        <h3 id="modalUsuarioTitulo" style="margin-bottom:14px">Nuevo estudiante</h3>
        <input type="hidden" id="usuarioIdEdit">

        <label style="font-size:12.5px;color:#6b7280">Nombre</label>
        <input type="text" id="usuarioNombreInput" placeholder="Saren"
            style="width:100%;padding:10px;border:1px solid #dde3ea;border-radius:6px;margin:6px 0 14px">

        <label style="font-size:12.5px;color:#6b7280">Apellido</label>
        <input type="text" id="usuarioApellidoInput" placeholder="Gonzalez"
            style="width:100%;padding:10px;border:1px solid #dde3ea;border-radius:6px;margin:6px 0 14px">

        <div id="campoCedula">
            <label style="font-size:12.5px;color:#6b7280">Cédula</label>
            <input type="text" id="usuarioCedulaInput" placeholder="0944128396"
                style="width:100%;padding:10px;border:1px solid #dde3ea;border-radius:6px;margin:6px 0 16px">
        </div>

        <p id="modalUsuarioMsg" style="color:#d33;font-size:12.5px;margin-bottom:10px"></p>

        <div style="display:flex;gap:8px">
            <button id="btnGuardarUsuario"
                style="flex:1;padding:10px;background:#123a5e;color:#fff;border:none;border-radius:6px;cursor:pointer">Guardar</button>
            <button id="btnCancelarUsuario"
                style="flex:1;padding:10px;background:#f1f3f6;border:none;border-radius:6px;cursor:pointer">Cancelar</button>
        </div>
    </div>
</div>
