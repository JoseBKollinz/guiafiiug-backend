<div class="chart-card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <h3><i class="ti ti-building"></i> Gestión de Bloques</h3>
    <button class="btn-login" style="width:auto;padding:8px 16px;font-size:13px" id="btnNuevoBloque"><i
        class="ti ti-plus"></i> Nuevo bloque</button>
  </div>
  <div class="stats-grid" id="bloquesStats" style="margin-bottom:16px"></div>

  <div class="charts-row">
    <div class="chart-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h3><i class="ti ti-building"></i> Gestión de Bloques</h3>
        <button class="btn-login" style="width:auto;padding:8px 16px;font-size:13px" id="btnNuevoBloque"><i
            class="ti ti-plus"></i> Nuevo</button>
      </div>
      <div id="listaBloques" class="scroll-box" style="max-height:280px"></div>
      <p id="bloquesMsg" style="color:#d33;font-size:12.5px;margin-top:8px"></p>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="side-panel">
        <h3><i class="ti ti-chart-bar"></i> Aulas por bloque</h3>
        <div style="position:relative;height:200px">
          <canvas id="aulasPorBloqueChart"></canvas>
        </div>
      </div>

      <div class="side-panel">
        <h3><i class="ti ti-category"></i> Distribución por tipo</h3>
        <div style="position:relative;height:180px">
          <canvas id="tiposGlobalChart"></canvas>
        </div>
      </div>
    </div>
  </div>
  <!-- modal igual que antes -->
  <div id="listaBloques" class="scroll-box" style="max-height:340px"></div>
  <p id="bloquesMsg" style="color:#d33;font-size:12.5px;margin-top:8px"></p>
</div>

<div id="modalBloque"
  style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:100">
  <div style="background:#fff;border-radius:12px;padding:24px;width:320px">
    <h3 id="modalBloqueTitulo" style="margin-bottom:14px">Nuevo bloque</h3>
    <input type="hidden" id="bloqueIdEdit">
    <label style="font-size:12.5px;color:#6b7280">Nombre del bloque</label>
    <input type="text" id="bloqueNombreInput" placeholder="Bloque H"
      style="width:100%;padding:10px;border:1px solid #dde3ea;border-radius:6px;margin:6px 0 16px">
    <div style="display:flex;gap:8px">
      <button id="btnGuardarBloque"
        style="flex:1;padding:10px;background:#0a3d42;color:#fff;border:none;border-radius:6px;cursor:pointer">Guardar</button>
      <button id="btnCancelarBloque"
        style="flex:1;padding:10px;background:#f1f3f6;border:none;border-radius:6px;cursor:pointer">Cancelar</button>
    </div>
  </div>
</div>
