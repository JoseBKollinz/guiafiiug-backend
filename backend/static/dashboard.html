<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Control | Sistema de Gestión de Espacios</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="logo-box">UG</div>
      <div class="brand-text">
        <strong>Facultad de Ingeniería</strong>
        <span>Industrial</span>
      </div>
    </div>
    <div class="sidebar-search">
      <input type="text" placeholder="Buscar módulo...">
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <div class="content">
    <header class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-period">📅 Periodo <strong>2026</strong></div>
      <div class="topbar-right">
        <span class="bell">🔔</span>
        <div class="user-chip">
          <div class="avatar" id="avatarInitials"></div>
          <div class="user-info">
            <strong id="userName"></strong>
            <span id="userRoleLabel"></span>
          </div>
        </div>
        <button class="logout-btn" onclick="logout()">Salir</button>
      </div>
    </header>

    <main class="main" id="contenido"></main>
  </div>
</div>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/dashboard-shell.js"></script>
</body>
</html>
