<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Panel de Control | Sistema de Gestión de Espacios</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="icon" type="image/png" href="img/logo-facultad.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>

<body>

  <div class="layout" id="layoutRoot">
    <button class="btn-mostrar-sidebar" id="btnMostrarSidebar" title="Mostrar menú">
      <i class="ti ti-layout-sidebar"></i>
    </button>

    <img src="img/logo-ug.png" alt="" class="logo-flotante-dash logo-ug-dash">
    <img src="img/logo-facultad.png" alt="" class="logo-flotante-dash logo-facultad-dash">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo-box">
          <img src="img/logo-ug.png" alt="Universidad de Guayaquil">
        </div>
        <div class="brand-text">
          <strong>Facultad de Ingeniería</strong>
          <span>Industrial</span>
        </div>
      </div>
      <div class="sidebar-search">
        <input type="text" placeholder="Buscar módulo...">
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
    </aside>

    <div class="content">
      <header class="topbar">
        <button class="hamburger" id="hamburger" title="Colapsar menú" aria-label="Colapsar menú">
          <i class="ti ti-menu-2"></i>
        </button>
        <div class="topbar-period"><i class="ti ti-calendar"></i> Periodo <strong id="periodoActual">2026</strong></div>
        <div class="topbar-right">
          <button class="bell-btn" id="bellBtn" title="Notificaciones" aria-label="Notificaciones">
            <i class="ti ti-bell"></i>
            <span class="bell-dot" id="bellDot"></span>
          </button>
          <div class="user-chip">
            <div class="avatar" id="avatarInitials"></div>
            <div class="user-info">
              <strong id="userName"></strong>
              <span id="userRoleLabel"></span>
            </div>
          </div>
          <button class="logout-btn" onclick="logout()">Salir</button>
        </div>
      </header>

      <main class="main" id="contenido"></main>
    </div>
  </div>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/dashboard-shell.js"></script>
</body>

</html>
