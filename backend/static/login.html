<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciar sesión | Sistema de Gestión de Espacios</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-shell">
  <div class="login-panel">

    <div class="login-left">
      <span class="eyebrow">ACCESO INSTITUCIONAL</span>
      <h1>Login</h1>

      <form id="loginForm">
        <div class="field">
          <label for="email">Usuario o correo</label>
          <div class="field-row">
            <input type="email" id="email" placeholder="usuario@fiindustrial.edu.ec" required>
            <span class="field-icon">👤</span>
          </div>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <div class="field-row">
            <input type="password" id="password" placeholder="••••••••" required>
            <span class="field-icon" id="togglePass" style="cursor:pointer">🔒</span>
          </div>
        </div>

        <p id="errorMsg" class="error-msg"></p>

        <button type="submit" class="btn-login" id="btnIngresar">Login</button>
      </form>

      <p class="signup-note">¿Eres visitante? <a href="visitante.html">Entrar sin cuenta</a></p>
    </div>

    <div class="login-right">
      <h2>BIENVENIDO<br>USUARIO!</h2>
      <p>Sistema Inteligente de Gestión de Espacios — Facultad de Ingeniería Industrial.</p>
    </div>

  </div>
</div>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/auth.js"></script>
</body>
</html>
